<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baires.electronic.import | Catálogo</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fondo: #080101;
            --tarjeta: #151515;
            --acento: #0056b3;
            --whatsapp: #25d366;
            --texto: #f8f3f3;
        }

        body {
            background-color: var(--fondo);
            color: var(--texto);
            font-family: 'Roboto', sans-serif;
            margin: 0; padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #1a1a1a;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #333;
        }

        .logo { width: 80px; border-radius: 10px; margin-bottom: 10px; }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; flex: 1; }

        /* Buscador */
        .search-container { text-align: center; margin-bottom: 25px; }
        #buscador {
            width: 90%; max-width: 400px;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid #444;
            background: #222;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        /* Grilla */
        #grilla {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .card {
            background: var(--tarjeta);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .card:hover { border-color: var(--acento); transform: translateY(-3px); }

        .card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: contain;
            background: #000;
            border-radius: 8px;
        }

        .card h3 {
            font-size: 0.85rem;
            margin: 12px 0;
            height: 40px;
            overflow: hidden;
            text-transform: uppercase;
            color: #ccc;
        }

        .btn-wa {
            background: var(--whatsapp);
            color: white;
            text-decoration: none;
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.8rem;
            text-align: center;
            margin-top: auto;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.7rem;
            color: #555;
            border-top: 1px solid #222;
        }

        @media (max-width: 600px) {
            #grilla { grid-template-columns: 1fr 1fr; gap: 10px; }
        }
    </style>
</head>
<body>

<header>
    <img src="https://cdn.catalog-store.link/55e2b5b45ddc3e759b1be34d66cabdcb_image.webp" class="logo">
    <h2 style="margin:0; font-size: 1.2rem;">Baires.electronic.import</h2>
</header>

<div class="container">
    <div class="search-container">
        <input type="text" id="buscador" placeholder="¿Qué estás buscando?" onkeyup="filtrar()">
    </div>

    <div id="grilla">
        </div>
</div>

<footer>
    <p>Ituzaingó, Buenos Aires | Catálogo 2026</p>
</footer>

<script>
    // --- LISTADO DE TUS PRODUCTOS ---
    // Agregá o editá acá. 'n' es el nombre, 'i' es el nombre de la foto en tu GitHub.
    const productos = [
        { n: "Aire BGH Inverter 3650W F/C", i: "aire-bgh.jpg" },
        { n: "Aire Philco 3550W Inverter Eco Plus", i: "aire-philco.jpg" },
        { n: "Parlante JBL Charge 6", i: "jbl-charge.jpg" },
        { n: "Smart TV Global 50\" Android TV", i: "tv-50.jpg" },
        { n: "Smart TV Global 43\" Android TV", i: "tv-43.jpg" },
        { n: "Lavarropas Philco 11kg Inverter Silver", i: "lavarropas.jpg" }
    ];

    const nroWA = "541136735577";

    function render(lista) {
        const grilla = document.getElementById('grilla');
        grilla.innerHTML = lista.map(p => `
            <div class="card">
                <img src="${p.i}" alt="${p.n}">
                <h3>${p.n}</h3>
                <a href="https://wa.me/${nroWA}?text=Hola! Me interesa: ${p.n}" target="_blank" class="btn-wa">Consultar</a>
            </div>
        `).join('');
    }

    function filtrar() {
        const txt = document.getElementById('buscador').value.toLowerCase();
        const f = productos.filter(p => p.n.toLowerCase().includes(txt));
        render(f);
    }

    render(productos);
</script>

</body>
</html>
