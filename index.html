    <style type="text/css">
        /* Estilos base del sitio original */
        body { font-family: sans-serif; background-color: #080101; color: #f8f3f3; margin: 0; padding: 0; }
        header { background-color: #1a1a1a; padding: 20px; text-align: center; border-bottom: 2px solid #0056b3; }
        .logo-img { width: 120px; border-radius: 10%; margin-bottom: 10px; }
        
        /* Contenedor de búsqueda (sin precios) */
        .search-container { padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 15px; }

        /* Botón de Catálogo */
        .btnVerCatalogoWeb { 
            background: #0056b3; 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 50px; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            cursor: pointer;
            text-decoration: none;
        }

        /* Grilla de productos (Simulando la estructura del original) */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .product-card { background: #1a1a1a; border-radius: 8px; overflow: hidden; border: 1px solid #333; text-align: center; padding-bottom: 10px; }
        .product-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .product-info h3 { font-size: 0.8rem; margin: 10px 5px; color: #eee; height: 32px; overflow: hidden; }
        
        /* Botón de WhatsApp Flotante */
        .wa-float { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            background: #25d366; 
            color: white; 
            padding: 15px; 
            border-radius: 50px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
            text-decoration: none; 
            font-weight: bold;
            z-index: 999;
        }
    </style>
</head>
