<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baires.electronic.import | Catálogo</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --fondo-oscuro: #080101;
            --acento-azul: #0056b3;
            --texto-claro: #f8f3f3;
            --gris-tarjeta: #151515;
        }

        body {
            background-color: var(--fondo-oscuro);
            color: var(--texto-claro);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Header Principal */
        header {
            background-color: #1a1a1a;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #333;
        }

        .logo-container img {
            width: 120px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }

        /* Sección de Búsqueda y Navegación */
        .nav-container {
            padding: 30px 20px;
            text-align: center;
            background: linear-gradient(180deg, #1a1a1a 0%, var(--fondo-oscuro) 100%);
        }

        .search-box {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid #444;
            background: #222;
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
            outline: none;
        }

        .btn-catalogo {
            background-color: var(--acento-azul);
            color: white;
            padding: 12px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            transition: transform 0.2s;
        }

        .btn-catalogo:hover {
            transform: scale(1.05);
        }

        /* Grilla de Productos (Sin precios) */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .grid-productos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .producto-card {
            background: var(--gris-tarjeta);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .producto-card:hover {
            border-color: var(--acento-azul);
        }

        .producto-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 10px;
            background: #222;
        }

        .producto-info h3 {
            font-size: 1rem;
            margin: 15px 0 10px 0;
            height: 40px;
            overflow: hidden;
        }

        /* Botón de Consulta WhatsApp */
        .btn-consulta {
            display: block;
            background: #25d366;
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            font-size: 0.8rem;
            color: #666;
        }

        @media (max-width: 600px) {
            .grid-productos {
                grid-template-columns: 1fr 1fr; /* Dos columnas en móvil */
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://cdn.catalog-store.link/55e2b5b45ddc3e759b1be34d66cabdcb_image.webp" alt="Logo Baires">
        </div>
        <h1>Baires.electronic.import</h1>
    </header>

    <section class="nav-container">
        <input type="search" class="search-box" placeholder="¿Qué estás buscando?">
        <br>
        <a href="#" class="btn-catalogo">VER CATEGORÍAS</a>
    </section>

    <main class="container">
        <div class="grid-productos">
            
            <div class="producto-card">
                <img src="https://via.placeholder.com/300" class="producto-img" alt="Producto">
                <div class="producto-info">
                    <h3>Smart TV 50" 4K Ultra HD</h3>
                    <a href="https://wa.me/541136735577?text=Hola!%20Me%20interesa%20el%20Smart%20TV%2050" class="btn-consulta">Consultar Disponibilidad</a>
                </div>
            </div>

            <div class="producto-card">
                <img src="https://via.placeholder.com/300" class="producto-img" alt="Producto">
                <div class="producto-info">
                    <h3>Lavarropas Automático 8kg</h3>
                    <a href="https://wa.me/541136735577?text=Hola!%20Me%20interesa%20el%20Lavarropas" class="btn-consulta">Consultar Disponibilidad</a>
                </div>
            </div>

            </div>
    </main>

    <footer>
        <p>&copy; 2026 Baires.electronic.import - Ituzaingó, Buenos Aires</p>
    </footer>

</body>
</html>
